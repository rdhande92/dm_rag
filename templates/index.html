<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Chatbot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 900px;
            height: 85vh;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.2);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .status-dot.ready {
            background-color: #4ade80;
        }

        .status-dot.loading {
            background-color: #fbbf24;
        }

        .status-dot.error {
            background-color: #ef4444;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        /* Main Content Area */
        .main-content {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* Chat Area */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-right: 2px solid #f0f0f0;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            background: #fafafa;
        }

        .message {
            display: flex;
            gap: 15px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.assistant {
            justify-content: flex-start;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: white;
            font-size: 18px;
            flex-shrink: 0;
        }

        .avatar.user {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .avatar.assistant {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .message-content {
            max-width: 70%;
            word-wrap: break-word;
        }

        .message-bubble {
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 15px;
            line-height: 1.5;
        }

        .message.user .message-bubble {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.assistant .message-bubble {
            background: #e5e7eb;
            color: #1f2937;
            border-bottom-left-radius: 4px;
        }

        .message-time {
            font-size: 12px;
            color: #9ca3af;
            margin-top: 5px;
            margin-left: 12px;
        }

        .message.user .message-time {
            text-align: right;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #e5e7eb;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Input Area */
        .input-area {
            padding: 20px 30px;
            background: white;
            border-top: 2px solid #f0f0f0;
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .input-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-field {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        textarea {
            flex: 1;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            padding: 12px 16px;
            font-family: inherit;
            font-size: 15px;
            resize: none;
            max-height: 100px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .send-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .send-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .init-btn {
            background: #10b981;
            color: white;
        }

        .init-btn:hover:not(:disabled) {
            background: #059669;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3);
        }

        .init-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Sources Panel */
        .sources-panel {
            width: 350px;
            background: white;
            border-left: 2px solid #f0f0f0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sources-header {
            padding: 20px;
            background: #f9fafb;
            border-bottom: 2px solid #f0f0f0;
            font-weight: 600;
            color: #1f2937;
            font-size: 14px;
        }

        .sources-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .source-item {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 15px;
            font-size: 13px;
            line-height: 1.6;
            color: #374151;
        }

        .source-header {
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 8px;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .source-badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }

        .source-meta {
            font-size: 12px;
            color: #6b7280;
            margin-top: 8px;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #9ca3af;
            text-align: center;
            padding: 20px;
        }

        .empty-state-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        /* Welcome Message */
        .welcome-message {
            text-align: center;
            padding: 40px 20px;
            color: #6b7280;
        }

        .welcome-message h2 {
            color: #1f2937;
            margin-bottom: 10px;
            font-size: 20px;
        }

        .welcome-message p {
            margin-bottom: 20px;
            font-size: 14px;
        }

        .welcome-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .welcome-actions button {
            padding: 10px 20px;
            font-size: 14px;
        }

        /* Error Message */
        .error-message {
            background: #fee2e2;
            color: #991b1b;
            padding: 12px 16px;
            border-radius: 8px;
            border-left: 4px solid #dc2626;
            font-size: 14px;
            margin-bottom: 10px;
        }

        /* Success Message */
        .success-message {
            background: #dcfce7;
            color: #166534;
            padding: 12px 16px;
            border-radius: 8px;
            border-left: 4px solid #22c55e;
            font-size: 14px;
            margin-bottom: 10px;
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #d1d5db;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #9ca3af;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .container {
                height: 100vh;
                border-radius: 0;
            }

            .sources-panel {
                display: none;
            }

            .message-content {
                max-width: 85%;
            }

            .header h1 {
                font-size: 18px;
            }

            .status-badge {
                font-size: 12px;
                padding: 6px 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>
                <span>🤖</span>
                RAG Chatbot
            </h1>
            <div class="status-badge">
                <div class="status-dot ready" id="statusDot"></div>
                <span id="statusText">Ready</span>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Chat Area -->
            <div class="chat-area">
                <div class="messages" id="messagesContainer">
                    <div class="welcome-message">
                        <div class="welcome-message-icon" style="font-size: 48px; margin-bottom: 15px;">📚</div>
                        <h2>Welcome to RAG Chatbot</h2>
                        <p>Ask questions about your documents. The AI will search your knowledge base and provide accurate answers.</p>
                        <div class="welcome-actions">
                            <button class="init-btn" onclick="initializeDatabase()">Initialize Database</button>
                        </div>
                    </div>
                </div>

                <!-- Input Area -->
                <div class="input-area">
                    <div class="input-wrapper">
                        <div id="messageAlert"></div>
                        <div class="input-field">
                            <textarea
                                id="queryInput"
                                placeholder="Ask a question about your documents... (Press Shift+Enter for new line, Enter to send)"
                                rows="1"
                            ></textarea>
                            <button class="send-btn" id="sendBtn" onclick="sendQuery()">
                                <span>Send</span>
                                <span id="sendBtnIcon">➤</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Sources Panel -->
            <div class="sources-panel">
                <div class="sources-header">📄 Retrieved Sources</div>
                <div class="sources-content" id="sourcesContent">
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <p>Sources will appear here</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = window.location.origin;
        let isInitialized = false;
        let isLoading = false;

        // Auto-resize textarea
        const queryInput = document.getElementById('queryInput');
        queryInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 100) + 'px';
        });

        // Handle Enter key
        queryInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendQuery();
            }
        });

        // Initialize on page load - auto-create DB if not present
        window.addEventListener('load', initializeOnLoad);

        async function initializeOnLoad() {
            try {
                const response = await fetch(`${API_BASE_URL}/status`);
                const data = await response.json();
                
                if (data.status === 'ready') {
                    isInitialized = true;
                    updateStatus('ready', `Ready (${data.total_chunks} chunks)`);
                    showMessage(`✅ Database loaded with ${data.total_chunks} chunks. Ready to answer questions!`, 'assistant');
                } else {
                    // Auto-initialize if database doesn't exist
                    console.log('Database not initialized. Auto-initializing...');
                    updateStatus('loading', 'Creating database...');
                    await initializeDatabase();
                }
            } catch (error) {
                console.log('Backend not available:', error);
                updateStatus('error', 'Offline');
                showMessage('❌ Backend server is not running. Please start the server.', 'assistant');
            }
        }

        function updateStatus(status, text) {
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            statusDot.className = `status-dot ${status}`;
            statusText.textContent = text;
        }

        function showMessage(text, sender, sources = null) {
            const messagesContainer = document.getElementById('messagesContainer');
            
            // Remove welcome message if it exists
            const welcomeMessage = messagesContainer.querySelector('.welcome-message');
            if (welcomeMessage) {
                welcomeMessage.remove();
            }

            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;

            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            messageDiv.innerHTML = `
                <div class="avatar ${sender}">
                    ${sender === 'user' ? '👤' : '🤖'}
                </div>
                <div class="message-content">
                    <div class="message-bubble">${escapeHtml(text)}</div>
                    <div class="message-time">${time}</div>
                </div>
            `;

            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;

            if (sources) {
                displaySources(sources);
            }
        }

        function displaySources(sources) {
            const sourcesContent = document.getElementById('sourcesContent');
            sourcesContent.innerHTML = '';

            if (sources.length === 0) {
                sourcesContent.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <p>No sources found</p>
                    </div>
                `;
                return;
            }

            sources.forEach((source, index) => {
                const sourceDiv = document.createElement('div');
                sourceDiv.className = 'source-item';
                sourceDiv.innerHTML = `
                    <div class="source-header">
                        <span class="source-badge">Source ${index + 1}</span>
                    </div>
                    <div style="margin-bottom: 8px; color: #1f2937; font-weight: 500;">
                        ${escapeHtml(source.text.substring(0, 150))}${source.text.length > 150 ? '...' : ''}
                    </div>
                    <div class="source-meta">
                        📄 ${escapeHtml(source.file)} | 📖 Page ${source.page}
                        ${source.distance ? `| 📏 Distance: ${source.distance.toFixed(2)}` : ''}
                    </div>
                `;
                sourcesContent.appendChild(sourceDiv);
            });
        }

        function showAlert(message, type) {
            const alertDiv = document.getElementById('messageAlert');
            const className = type === 'error' ? 'error-message' : 'success-message';
            alertDiv.innerHTML = `<div class="${className}">${escapeHtml(message)}</div>`;
            setTimeout(() => {
                alertDiv.innerHTML = '';
            }, 5000);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function checkStatus() {
            try {
                const response = await fetch(`${API_BASE_URL}/status`);
                const data = await response.json();
                
                if (data.status === 'ready') {
                    isInitialized = true;
                    updateStatus('ready', `Ready (${data.total_chunks} chunks)`);
                } else {
                    isInitialized = false;
                    updateStatus('loading', 'Not initialized');
                }
            } catch (error) {
                console.log('Backend not available:', error);
                updateStatus('error', 'Offline');
            }
        }

        async function initializeDatabase() {
            if (isLoading) return;
            isLoading = true;
            updateStatus('loading', 'Initializing...');

            try {
                const response = await fetch(`${API_BASE_URL}/create_db`);
                const data = await response.json();

                if (data.status === 'success') {
                    isInitialized = true;
                    updateStatus('ready', `Ready (${data.total_chunks} chunks)`);
                    showAlert(`Database initialized with ${data.total_chunks} chunks`, 'success');
                    showMessage(`✅ Database initialized successfully with ${data.total_chunks} chunks from PDFs!`, 'assistant');
                } else {
                    showAlert(data.message, 'error');
                    showMessage(`❌ Error: ${data.message}`, 'assistant');
                }
            } catch (error) {
                showAlert('Failed to connect to backend. Make sure the server is running', 'error');
                showMessage('❌ Connection error. Is the server running?', 'assistant');
                updateStatus('error', 'Connection failed');
            } finally {
                isLoading = false;
            }
        }

        async function sendQuery() {
            const query = queryInput.value.trim();
            if (!query || isLoading) return;

            if (!isInitialized) {
                showAlert('Please initialize the database first', 'error');
                return;
            }

            // Clear input and show user message
            queryInput.value = '';
            queryInput.style.height = 'auto';
            showMessage(query, 'user');

            isLoading = true;
            updateStatus('loading', 'Thinking...');
            document.getElementById('sendBtn').disabled = true;
            document.getElementById('sendBtnIcon').innerHTML = '<span class="loading-spinner"></span>';

            try {
                const response = await fetch(`${API_BASE_URL}/get_query_answer`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ query: query })
                });

                const data = await response.json();

                if (data.status === 'success') {
                    showMessage(data.response, 'assistant', data.chunks_used);
                    showAlert(`✓ Found ${data.chunks_used.length} relevant sources`, 'success');
                } else {
                    showMessage(`❌ Error: ${data.message}`, 'assistant');
                    showAlert(data.message, 'error');
                }
            } catch (error) {
                showMessage('❌ Error connecting to the server', 'assistant');
                showAlert('Failed to send query. Make sure the server is running', 'error');
            } finally {
                isLoading = false;
                updateStatus('ready', 'Ready');
                document.getElementById('sendBtn').disabled = false;
                document.getElementById('sendBtnIcon').innerHTML = '➤';
                queryInput.focus();
            }
        }
    </script>
</body>
</html>
